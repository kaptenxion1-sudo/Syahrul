<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYAHRUL | QUANTUM V8.0</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; background: #000; color: #0f0; 
            font-family: 'Fira Code', monospace; overflow-x: hidden;
            scroll-snap-type: y mandatory;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        section { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            scroll-snap-align: start; padding: 20px;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
            padding: 25px; width: 100%; max-width: 600px;
            position: relative; transition: 1s; transform: scale(0.9); opacity: 0;
        }

        section.active .terminal { transform: scale(1); opacity: 1; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-exe {
            border: 1px solid #ff0000; color: #ff0000; padding: 15px 40px;
            letter-spacing: 5px; cursor: pointer; background: transparent; transition: 0.5s;
        }
        .btn-exe:hover { background: #ff0000; color: #000; box-shadow: 0 0 50px #ff0000; }

        .nav-btn {
            display: block; width: 100%; text-align: left; padding: 10px;
            border: 1px solid #333; margin-top: 10px; font-size: 12px; transition: 0.3s;
        }
        .nav-btn:hover { border-color: #0f0; background: rgba(0,255,0,0.1); }
        
        .glitch { animation: glitch 1s infinite alternate; }
        @keyframes glitch {
            0% { text-shadow: 1px 0 #f00; }
            100% { text-shadow: -1px 0 #00f; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="mb-4 text-xs tracking-widest text-zinc-500 animate-pulse italic">DECRYPTING PROTOCOL V8.0...</div>
        <button class="btn-exe" onclick="initSystem()">EXECUTE</button>
    </div>

    <canvas id="matrix"></canvas>

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <section id="s1">
        <div class="terminal border-t-4 border-red-600">
            <div class="flex justify-between text-[10px] mb-4 text-zinc-500">
                <span>SYS.IDENT: SYAHRUL</span>
                <span id="clock">00:00:00</span>
            </div>
            <h1 class="text-4xl font-bold glitch italic text-white">SYAHRUL<span class="text-red-600">.</span>SYS</h1>
            <p class="text-blue-500 text-xs mt-2 tracking-[0.5rem] uppercase">TKJ SPECIALIST</p>
            <div class="mt-8 p-4 bg-zinc-900/50 text-[11px] text-zinc-400">
                > VISITOR_IP: <span id="ip" class="text-red-500">FETCHING...</span><br>
                > STATUS: <span class="text-green-500">CONNECTED</span><br>
                > LOCATION: <span id="loc">WAJO, INDONESIA</span>
            </div>
            <p class="mt-6 text-sm italic">"Scroll ke bawah untuk mengakses core data."</p>
        </div>
    </section>

    <section id="s2">
        <div class="terminal border-l-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4 text-white uppercase italic">Core_Database</h2>
            <div class="space-y-2 text-sm">
                <p><span class="text-zinc-500">[NAME] :</span> SYAHRUL</p>
                <p><span class="text-zinc-500">[AGE] :</span> 16 Y.O</p>
                <p><span class="text-zinc-500">[BORN] :</span> 29 NOV 2009</p>
                <p><span class="text-zinc-500">[INST] :</span> SMKN 1 WAJO</p>
            </div>
            <div class="mt-8">
                <button class="nav-btn text-green-500 border-green-900" onclick="contactWA()">
                    >> ESTABLISH_WHATSAPP_LINK
                </button>
                <button class="nav-btn" onclick="speak('Misi utama saya adalah menguasai arsitektur digital.')">
                    >> VIEW_MISSION_STATEMENT
                </button>
            </div>
        </div>
    </section>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "010101010101SYAHRULV8";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // Clock & IP Sim (Buat Kece-kecean)
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        setTimeout(() => { document.getElementById('ip').innerText = "182.1." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255); }, 2000);

        // Audio & Voice Logic
        const bgm = document.getElementById('bgm');
        
        function speak(txt) {
            if(window.responsiveVoice) {
                responsiveVoice.speak(txt, "Indonesian Male", {pitch: 0.7, rate: 0.9});
            }
        }

        function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('s1').classList.add('active');
            bgm.volume = 0.2;
            bgm.play();
            speak("Sistem diaktifkan. Halo Syahrul. Mempersiapkan protokol T K J. Selamat datang bos.");
        }

        function contactWA() {
            speak("Membangun jalur aman ke WhatsApp Syahrul. Harap tunggu.");
            setTimeout(() => {
                window.open("https://wa.me/6282293795296?text=Protokol%20Diterima.%20Halo%20Syahrul.", "_blank");
            }, 2000);
        }

        // Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    e.target.classList.add('active');
                    if(e.target.id === 's2') speak("Mengakses basis data SMK Negeri satu Wajo.");
                }
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
