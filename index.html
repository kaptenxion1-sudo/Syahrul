<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYAHRUL | ANIME VERSION</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&family=Bangers&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Fira Code', monospace; overflow-x: hidden; }

        /* INTRO ANIME LAYER */
        #anime-intro {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: none;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        .speed-line {
            position: absolute; background: #fff;
            width: 2px; height: 1000px; opacity: 0.6;
            animation: anime-speed 0.1s linear infinite;
        }

        @keyframes anime-speed {
            0% { transform: translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%) rotate(45deg); opacity: 0; }
        }

        .anime-title {
            font-family: 'Bangers', cursive;
            font-size: 5rem; color: #ff0000;
            text-shadow: 0 0 20px #fff, 5px 5px #0000ff;
            z-index: 10001; transform: scale(0);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flash {
            position: fixed; inset: 0; background: #fff; z-index: 10002;
            opacity: 0; pointer-events: none;
        }

        /* WEB CONTENT */
        section { height: 100vh; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; }
        .terminal { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; padding: 25px; width: 90%; max-width: 600px; box-shadow: 0 0 50px rgba(255,0,0,0.3); }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 10005;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="px-10 py-4 border-2 border-blue-600 text-blue-600 font-bold hover:bg-blue-600 hover:text-white transition" onclick="triggerAnime()">
            ACTIVATE SYSTEM
        </button>
    </div>

    <div id="anime-intro">
        <div id="line-container"></div>
        <div class="anime-title" id="anime-text">SYAHRUL V8.0</div>
        <div class="flash" id="flash-effect"></div>
    </div>

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <section>
        <div class="terminal border-t-4 border-red-600">
            <h1 class="text-4xl font-bold italic mb-4">CORE_ACTIVE</h1>
            <p class="text-blue-500 tracking-widest uppercase text-sm font-bold">SYAHRUL | TKJ SPECIALIST</p>
            <div class="mt-8 p-4 bg-black/50 border border-zinc-800">
                <p class="text-[11px] text-zinc-400 font-bold uppercase mb-2">>> About Me:</p>
                <p class="text-sm italic leading-relaxed text-white">
                    "Gw adalah pelajar yang suka terjun ke dunia tekhnologi"
                </p>
            </div>
            <div class="mt-10">
                <button onclick="window.open('https://wa.me/6282293795296')" class="w-full py-3 border border-green-600 text-green-600 hover:bg-green-600 hover:text-black font-bold">
                    HUBUNGI WHATSAPP
                </button>
            </div>
        </div>
    </section>

    <script>
        // Buat garis kecepatan anime
        const container = document.getElementById('line-container');
        for (let i = 0; i < 30; i++) {
            const line = document.createElement('div');
            line.className = 'speed-line';
            line.style.left = Math.random() * 100 + 'vw';
            line.style.animationDelay = Math.random() * 0.5 + 's';
            container.appendChild(line);
        }

        function triggerAnime() {
            document.getElementById('overlay').style.display = 'none';
            const intro = document.getElementById('anime-intro');
            const text = document.getElementById('anime-text');
            const flash = document.getElementById('flash-effect');
            const bgm = document.getElementById('bgm');

            intro.style.display = 'flex';
            bgm.play();

            // Suara Perkenalan
            if(window.responsiveVoice) {
                responsiveVoice.speak("Sistem diaktifkan. Mode anime dihidupkan. Selamat datang kembali Syahrul.", "Indonesian Male", {pitch: 0.7});
            }

            // Animasi Judul Zoom In
            setTimeout(() => {
                text.style.transform = 'scale(1.2)';
            }, 100);

            // Efek Flash Putih di akhir
            setTimeout(() => {
                flash.style.opacity = '1';
                flash.style.transition = 'opacity 0.2s';
                setTimeout(() => {
                    intro.style.display = 'none';
                    flash.style.opacity = '0';
                }, 300);
            }, 2500);
        }
    </script>
</body>
</html>
